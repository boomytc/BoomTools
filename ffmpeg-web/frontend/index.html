<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoomTools ffmpeg-web</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230f766e'/%3E%3Cpath d='M18 20h28v6H18zm0 10h20v6H18zm0 10h28v6H18z' fill='%23fffdf8'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/static/css/styles.css" />
    <script type="module" src="/static/js/app.js"></script>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">BoomTools</p>
          <h1>ffmpeg-web</h1>
        </div>
        <div class="health-pill" id="healthPill" data-state="checking">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="healthText">检测 ffmpeg</span>
        </div>
      </header>

      <section class="workspace" aria-live="polite">
        <section class="panel upload-panel" aria-labelledby="uploadTitle">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Input</p>
              <h2 id="uploadTitle">输入文件</h2>
            </div>
            <span class="step-badge">01</span>
          </div>

          <label class="drop-zone" id="dropZone" for="fileInput" tabindex="0">
            <input id="fileInput" type="file" accept="video/*,audio/*,.mkv,.mov,.webm,.gif" />
            <span class="drop-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                <path d="M12 3v12m0-12 4.5 4.5M12 3 7.5 7.5M4 15v3a3 3 0 0 0 3 3h10a3 3 0 0 0 3-3v-3" />
              </svg>
            </span>
            <strong>选择或拖入媒体文件</strong>
            <span id="uploadHint">等待上传</span>
          </label>

          <div class="file-card is-empty" id="fileCard">
            <div>
              <p class="muted-label">文件</p>
              <strong id="fileName">尚未上传</strong>
            </div>
            <div class="file-meta-grid">
              <span id="fileSize">-</span>
              <span id="fileDuration">-</span>
              <span id="fileStreams">-</span>
            </div>
          </div>
        </section>

        <section class="panel options-panel" aria-labelledby="operationTitle">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Operation</p>
              <h2 id="operationTitle">处理参数</h2>
            </div>
            <span class="step-badge">02</span>
          </div>

          <form id="jobForm" class="tool-form">
            <div class="field">
              <label for="operation">操作</label>
              <select id="operation" name="operation">
                <option value="convert">格式转换</option>
                <option value="compress">压缩视频</option>
                <option value="extract_audio">抽取音频</option>
                <option value="gif">生成 GIF</option>
              </select>
            </div>

            <div class="field-grid">
              <div class="field">
                <label for="startSeconds">开始秒数</label>
                <input id="startSeconds" name="start_seconds" type="number" min="0" step="0.1" placeholder="可选" />
              </div>
              <div class="field">
                <label for="endSeconds">结束秒数</label>
                <input id="endSeconds" name="end_seconds" type="number" min="0" step="0.1" placeholder="可选" />
              </div>
            </div>

            <div class="operation-fields" id="operationFields"></div>

            <button class="primary-action" id="submitJob" type="submit" disabled>开始处理</button>
          </form>
        </section>

        <section class="panel status-panel" aria-labelledby="jobTitle">
          <div class="panel-heading">
            <div>
              <p class="section-kicker">Job</p>
              <h2 id="jobTitle">任务状态</h2>
            </div>
            <span class="step-badge">03</span>
          </div>

          <div class="job-status-card" id="jobStatusCard" data-state="idle">
            <div class="status-row">
              <strong id="jobMessage">等待任务</strong>
              <span id="jobState">idle</span>
            </div>
            <div class="progress-track" aria-label="任务进度">
              <span id="progressFill"></span>
            </div>
            <span class="progress-text" id="progressText">0%</span>
          </div>

          <div class="output-actions">
            <a class="download-link is-disabled" id="downloadLink" href="#" download>下载输出</a>
            <button class="danger-action" id="deleteJob" type="button" disabled>清理任务</button>
          </div>

          <div class="log-wrap">
            <div class="log-heading">
              <span>FFmpeg Log</span>
              <button id="clearLog" type="button">清空</button>
            </div>
            <pre id="logOutput">Ready.</pre>
          </div>
        </section>
      </section>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </main>
  </body>
</html>
